<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
<script>
// ── Straight Line — Horizontal ────────────────────────────────
// drawGuide() draws the reference line onto the baseline canvas
// and returns the CSS-pixel position of the start dot (origin).
// All input handling and stroke storage are managed by the host.

function drawGuide() {
  const w = cssW(), h = cssH();
  bctx.clearRect(0, 0, w, h);

  const lineLen = mmToPx(160);
  const cx = w / 2, cy = h / 2;
  const x0 = cx - lineLen / 2;
  const x1 = cx + lineLen / 2;

  bctx.lineCap = 'round';

  bctx.beginPath(); bctx.moveTo(x0, cy); bctx.lineTo(x1, cy);
  bctx.strokeStyle = '#e8e8e8'; bctx.lineWidth = 10; bctx.stroke();

  bctx.beginPath(); bctx.moveTo(x0, cy); bctx.lineTo(x1, cy);
  bctx.strokeStyle = '#aaaaaa'; bctx.lineWidth = 2.25; bctx.stroke();

  bctx.beginPath(); bctx.arc(x0, cy, 5, 0, Math.PI * 2);
  bctx.fillStyle = '#888'; bctx.fill();

  return { x: x0, y: cy };   // start dot = origin
}
</script></body></html>
