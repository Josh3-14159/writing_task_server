<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
<script>
function drawGuide() {
  const w = cssW(), h = cssH();
  bctx.clearRect(0, 0, w, h);

  const chord   = mmToPx(110);
  const sagitta = mmToPx(27.5);
  const cx = w / 2, cy = h / 2;
  const y0 = cy - chord / 2;
  const y1 = cy + chord / 2;

  const halfChord = chord / 2;
  const R = (sagitta * sagitta + halfChord * halfChord) / (2 * sagitta);
  const circCx = cx + (R - sagitta);
  const circCy = cy;

  const angleStart = Math.atan2(y0 - circCy, cx - circCx);
  const angleEnd   = Math.atan2(y1 - circCy, cx - circCx);

  function drawArc() {
    bctx.beginPath();
    bctx.arc(circCx, circCy, R, angleStart, angleEnd, true);
  }

  bctx.lineCap = 'round';
  drawArc(); bctx.strokeStyle = '#e8e8e8'; bctx.lineWidth = 10;   bctx.stroke();
  drawArc(); bctx.strokeStyle = '#aaaaaa'; bctx.lineWidth = 2.25; bctx.stroke();
  bctx.beginPath(); bctx.arc(cx, y0, 5, 0, Math.PI * 2);
  bctx.fillStyle = '#888'; bctx.fill();

  return { x: cx, y: y0 };
}
</script></body></html>
