<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>
<script>
function drawGuide() {
  const w = cssW(), h = cssH();
  bctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h / 2;
  const maxR = mmToPx(27.5), turns = 2.5, steps = 900;

  function spiralPt(i) {
    const t = (i / steps) * turns * Math.PI * 2;
    const r = (t / (turns * Math.PI * 2)) * maxR;
    return [ cx + r * Math.cos(-t), cy + r * Math.sin(-t) ];
  }

  bctx.lineCap = 'round';
  bctx.beginPath();
  for (let i = 0; i <= steps; i++) { const [x,y]=spiralPt(i); i===0?bctx.moveTo(x,y):bctx.lineTo(x,y); }
  bctx.strokeStyle = '#e8e8e8'; bctx.lineWidth = 10; bctx.stroke();
  bctx.beginPath();
  for (let i = 0; i <= steps; i++) { const [x,y]=spiralPt(i); i===0?bctx.moveTo(x,y):bctx.lineTo(x,y); }
  bctx.strokeStyle = '#aaaaaa'; bctx.lineWidth = 2.25; bctx.stroke();
  bctx.beginPath(); bctx.arc(cx, cy, 5, 0, Math.PI * 2);
  bctx.fillStyle = '#888'; bctx.fill();

  return { x: cx, y: cy };
}
</script></body></html>
